<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Voice Wave — Demo</title>
<style>
  :root{
    --bg: #0a0b10;
    --bar-bg: #1b1e29;
    --border: rgba(255,255,255,0.08);
    --text: #e8ecf5;
    --muted: #8a90a6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at 50% 20%, #14161f 0%, #08090d 70%);
    color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
    padding:40px 20px;
  }
  #bar{
    width:100%;
    max-width:900px;
    background:var(--bar-bg);
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:14px;
    position:relative;
  }
  #micBtn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    flex-shrink:0;
    background:linear-gradient(135deg,#3ad0c8,#6c7fff);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    box-shadow:0 0 0 rgba(108,127,255,0);
    transition:box-shadow .2s;
  }
  #micBtn.active{ box-shadow:0 0 18px rgba(108,127,255,0.55); }
  #waveWrap{
    flex:1;
    height:64px;
    position:relative;
  }
  #waveLabel{
    position:absolute;
    top:-2px; left:0; right:0;
    text-align:center;
    font-size:12px;
    color:var(--muted);
    letter-spacing:.04em;
    opacity:0;
    transition:opacity .3s;
  }
  #waveLabel.show{ opacity:1; }
  canvas#wave{ width:100%; height:100%; display:block; }
  #sendBtn{
    width:38px;height:38px;
    border-radius:50%;
    border:none;
    background:#2a2e3d;
    color:var(--muted);
    flex-shrink:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
  }
  #hint{ font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<div id="bar">
  <button id="micBtn" aria-label="Activar micrófono">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
    </svg>
  </button>
  <div id="waveWrap">
    <div id="waveLabel">Escuchando...</div>
    <canvas id="wave" width="1600" height="160"></canvas>
  </div>
  <button id="sendBtn" aria-label="Enviar">➤</button>
</div>

<div id="hint">Haz clic en el micrófono para activar la onda</div>

<script>
(function(){

  const canvas = document.getElementById('wave');
  const ctx = canvas.getContext('2d');
  const label = document.getElementById('waveLabel');
  const micBtn = document.getElementById('micBtn');

  let listening = false;
  let level = 0;
  let targetLevel = 0;
  let t = 0;

  function resize(){
    const wrap = document.getElementById('waveWrap');
    const ratio = window.devicePixelRatio || 1;
    canvas.width = wrap.clientWidth * ratio;
    canvas.height = wrap.clientHeight * ratio;
    canvas.style.width = wrap.clientWidth + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
    ctx.setTransform(ratio,0,0,ratio,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function waveY(x, w, amp, phase, freq, seed){
    const n = Math.sin(x*freq + phase + seed) * 0.6
            + Math.sin(x*freq*2.3 + phase*1.7) * 0.25
            + Math.sin(x*freq*0.6 - phase*0.8) * 0.15;
    return n * amp;
  }

  function draw(){
    t += 0.02;
    const targetSmoothing = 0.08;
    level += (targetLevel - level) * targetSmoothing;

    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const midY = h/2;

    ctx.clearRect(0,0,w,h);

    if(level < 0.01 && !listening){
      const flatAmp = 1.5;
      ctx.strokeStyle = 'rgba(140,150,190,0.25)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for(let x=0; x<=w; x+=4){
        const y = midY + Math.sin(x*0.02 + t*0.6) * flatAmp;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      requestAnimationFrame(draw);
      return;
    }

    const amp = h*0.42*level;
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0.0,  'rgba(58,208,200,0.95)');
    grad.addColorStop(0.45, 'rgba(80,150,240,0.95)');
    grad.addColorStop(0.75, 'rgba(140,120,240,0.95)');
    grad.addColorStop(1.0,  'rgba(190,140,235,0.9)');

    ctx.save();
    ctx.shadowColor = 'rgba(108,140,255,0.55)';
    ctx.shadowBlur = 14;

    ctx.beginPath();
    for(let x=0; x<=w; x+=3){
      const y = midY + waveY(x, w, amp, t*2.4, 0.018, 0);
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    for(let x=0; x<=w; x+=3){
      const y = midY + waveY(x, w, amp*0.65, t*2.4, 0.018, 1.8);
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;

    for(let i=0;i<5;i++){
      const dx = (w/6)*(i+1) + Math.sin(t*1.3+i*2)*18;
      const dy = midY + waveY(dx, w, amp, t*2.4, 0.018, 0) + Math.sin(t*3+i)*4;
      const r = 2 + Math.sin(t*4+i*1.7)*1.4;
      if(r > 0.5){
        ctx.beginPath();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.arc(dx,dy,Math.max(r,0.5),0,Math.PI*2);
        ctx.fill();
      }
    }

    ctx.restore();

    requestAnimationFrame(draw);
  }
  draw();

  function simulateLevel(){
    if(!listening) return;
    targetLevel = 0.35 + Math.random()*0.65;
    setTimeout(simulateLevel, 180 + Math.random()*220);
  }

  function startListening(){
    listening = true;
    micBtn.classList.add('active');
    label.classList.add('show');
    simulateLevel();
  }

  function stopListening(){
    listening = false;
    micBtn.classList.remove('active');
    label.classList.remove('show');
    targetLevel = 0;
  }

  micBtn.addEventListener('click', ()=>{
    listening ? stopListening() : startListening();
  });

})();
</script>
</body>
</html>
